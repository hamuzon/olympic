<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="any">
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

/* カスタムプロパティ */
:root {
  --selection-bg: rgba(0, 229, 255, 0.4);
  --selection-text: #ffffff;
}

/* リセット */
* { margin:0; padding:0; box-sizing:border-box; }

::selection {
  background: var(--selection-bg);
  color: var(--selection-text);
}

/* 背景と全体 */
body {
  background: #0a1a2b;
  font-family: 'Roboto', sans-serif;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  background-image: radial-gradient(circle at 50% 0%, #1e3a5f 0%, #0a1a2b 70%);
}

/* コンテナ */
.container {
  background: rgba(255, 255, 255, 0.07);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 24px;
  padding: 3rem 2rem;
  max-width: 480px;
  width: 100%;
  box-shadow: 0 0 40px rgba(0, 229, 255, 0.3);
  text-align: center;
  position: relative;
}

p.message {
  font-size: 1.2rem;
  color: #a0e0ff;
  margin-bottom: 2rem;
  font-weight: 500;
}

p.message span {
  font-size: 0.9em;
  opacity: 0.8;
}

/* ボタン (Link) */
a.redirect-btn {
  display: inline-block;
  background: rgba(0, 229, 255, 0.15);
  border: none;
  border-radius: 20px;
  color: #00e5ff;
  font-weight: 600;
  padding: 10px 24px;
  cursor: pointer;
  font-family: 'Roboto', sans-serif;
  transition: all 0.3s ease;
  font-size: 1rem;
  text-decoration: none;
}

a.redirect-btn:hover {
  background: rgba(0, 229, 255, 0.3);
  transform: translateY(-1px);
  color: #fff;
  box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
}

/* スマホ対応 */
@media (max-width: 480px) {
  .container { padding: 2rem 1.5rem; }
  p.message { font-size: 1rem; }
  a.redirect-btn { font-size: 0.9rem; padding: 8px 18px; }
}
</style>
    <script>
        (function() {
            const DEFAULT_FALLBACK_YEAR = "2028";
            const DEFAULT_FALLBACK_LANG = "en"; // ブラウザ言語がjaでない場合のデフォルト

            const pathSegments = window.location.pathname.split('/').filter(Boolean);
            
            let year = null;
            let lang = null;

            // 1. クエリパラメータ (?year=2028&lang=ja) から取得を試みる
            const params = new URLSearchParams(window.location.search);
            const qYear = params.get('year');
            const qLang = params.get('lang');

            if (qYear && /^\d{4}$/.test(qYear)) year = qYear;
            if (qLang === 'ja' || qLang === 'en') lang = qLang;

            // 2. クエリパラメータから取得できなかった、または無効だった場合、パスの中から年と言語を抽出
            if (!year || !lang) {
                pathSegments.forEach(segment => {
                    if (/^\d{4}$/.test(segment)) {
                        if (!year) year = segment; // yearがまだnullの場合のみ設定
                    } else if (segment === 'ja' || segment === 'en') {
                        if (!lang) lang = segment; // langがまだnullの場合のみ設定
                    }
                });
            }

            // 3. 最終的なフォールバック
            if (!year) year = DEFAULT_FALLBACK_YEAR;
            if (!lang) {
                lang = navigator.language.startsWith('ja') ? "ja" : DEFAULT_FALLBACK_LANG;
            }

            // 4. リダイレクト先の判定
            let target;
            if (window.location.hostname === 'hamuzon.github.io') {
                // hamuzon.github.io の場合のみ新しいパス形式へ
                target = window.location.origin + '/olympic-countdown/' + year + '/' + lang;
            } else {
                // それ以外は test のないトップ（親ディレクトリ）へ移動
                target = '../?year=' + year + '&lang=' + lang;
            }
            
            window.redirectTarget = target; // 手動リンク用
            window.location.replace(target);
        })();
    </script>
</head>
<body>
    <div class="container">
        <p class="message">リダイレクト中...<br><span>Redirecting...</span></p>
        <a class="redirect-btn" id="manualRedirectLink" href="#">自動的に移動しない場合はこちらをクリックしてください。</a>
    </div>
    <script>
        // JavaScriptの実行後に手動リダイレクトリンクのhrefを設定
        document.addEventListener('DOMContentLoaded', () => {
            if (window.redirectTarget) {
                document.getElementById('manualRedirectLink').href = window.redirectTarget;
            }
        });
    </script>
</body>
</html>
