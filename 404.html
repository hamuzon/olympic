<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Not Found</title>
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="any">
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

/* カスタムプロパティ */
:root {
  --selection-bg: rgba(0, 229, 255, 0.4);
  --selection-text: #ffffff;
}

/* リセット */
* { margin:0; padding:0; box-sizing:border-box; }

::selection {
  background: var(--selection-bg);
  color: var(--selection-text);
}

/* 背景と全体 */
body {
  background: #0a1a2b;
  font-family: 'Roboto', sans-serif;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  background-image: radial-gradient(circle at 50% 0%, #1e3a5f 0%, #0a1a2b 70%);
}

/* コンテナ */
.container {
  background: rgba(255, 255, 255, 0.07);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 24px;
  padding: 3rem 2rem;
  max-width: 480px;
  width: 100%;
  box-shadow: 0 0 40px rgba(0, 229, 255, 0.3);
  text-align: center;
  position: relative;
}

/* タイトル */
h1 {
  font-family: Arial, sans-serif;
  font-size: 4rem;
  font-weight: 700;
  /* Olympic colors gradient approximation */
  background: linear-gradient(90deg, #33b5e5, #ffbb33, #ffffff, #99cc00, #ff4444);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 8px rgba(255, 255, 255, 0.3), 0 0 20px rgba(255, 255, 255, 0.2);
  margin-bottom: 0.5rem;
  line-height: 1.2;
}

p.message {
  font-size: 1.2rem;
  color: #a0e0ff;
  margin-bottom: 2rem;
  font-weight: 500;
}

p.message span {
  font-size: 0.9em;
  opacity: 0.8;
}

/* ボタン (Link) */
a.back-btn {
  display: inline-block;
  background: rgba(0, 229, 255, 0.15);
  border: none;
  border-radius: 20px;
  color: #00e5ff;
  font-weight: 600;
  padding: 10px 24px;
  cursor: pointer;
  font-family: 'Roboto', sans-serif;
  transition: all 0.3s ease;
  font-size: 1rem;
  text-decoration: none;
}

a.back-btn:hover {
  background: rgba(0, 229, 255, 0.3);
  transform: translateY(-1px);
  color: #fff;
  box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
}

/* フッター */
.footer {
  font-size: 0.8rem;
  color: #4dd0e1;
  margin-top: 2rem;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  padding-top: 1rem;
  opacity: 0.8;
}

.footer a {
  color: #4ac8e0;
  text-decoration: none;
  transition: color 0.2s;
}

.footer a:hover {
  color: #fff;
  text-decoration: underline;
}

/* スマホ対応 */
@media (max-width: 480px) {
  .container { padding: 2rem 1.5rem; }
  h1 { font-size: 3rem; }
}
</style>
</head>
<body>

<div class="container">
  <h1>404</h1>
  <p class="message">ページが見つかりません<br><span>Sorry, Not Found.</span></p>

  <a id="backLink" class="back-btn" href="/">トップページへ戻る</a>

  <div class="footer" id="footer-copy"></div>
</div>

<script>

    document.addEventListener('DOMContentLoaded', () => {
      if (location.hostname === 'hamuzon.github.io' || location.hostname === 'hamuzon.github.io/olympic/') {
        document.getElementById('backLink').href = 'https://hamuzon.github.io/olympic/';
      }
    });
    

// Footer Logic
(function(){
  const baseYear = 2025;
  const currentYear = new Date().getFullYear();
  const hostname = location.hostname;
  const footer = document.getElementById("footer-copy");
  let footerHTML = "";
  
  let yearStr = baseYear.toString();
  if (currentYear > baseYear) {
    yearStr = `${baseYear}–${currentYear}`;
  } else if (currentYear < baseYear) {
    yearStr = `${currentYear}–${baseYear}`;
  }
  
  if(hostname === "hamuzon.github.io"){
    footerHTML = `&copy; ${yearStr} <a href="https://hamuzon.github.io" target="_blank">@hamuzon</a>`;
  } else if (hostname.includes("hamuzon-jp.f5.si")) {
    footerHTML = `&copy; ${yearStr} <a href="https://hamuzon-jp.f5.si" target="_blank">@hamuzon</a>`;
  } else if(hostname.includes("hamusata.f5.si")){
    footerHTML = `&copy; ${yearStr} <a href="https://hamusata.f5.si" target="_blank">@hamusata</a>`;
  } else {
    footerHTML = `&copy; ${yearStr} Olympic Countdown`;
  }
  
  if(footer) footer.innerHTML = footerHTML;
})();
</script>

</body>
</html>
