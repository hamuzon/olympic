<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympic Countdown / オリンピック関連カウントダウン</title>
<meta name="description" content="夏季・冬季オリンピックの開催まで、開催期間中、終了後の経過時間をリアルタイムで表示するカウントダウンタイマーです。">
<meta name="keywords" content="オリンピック, カウントダウン, 五輪, Olympic, Countdown, 2026, 2028, 夏季, 冬季">
<meta name="author" content="hamuzon">
<meta property="og:title" content="Olympic Countdown / オリンピック関連カウントダウン">
<meta property="og:description" content="夏季・冬季オリンピックの開催まで、開催期間中、終了後の経過時間をリアルタイムで表示するカウントダウンタイマーです。">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">

<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

/* カスタムプロパティ */
:root {
  --selection-bg: rgba(0, 229, 255, 0.4);
  --selection-text: #ffffff;
}

/* リセット */
* { margin:0; padding:0; box-sizing:border-box; }

::selection {
  background: var(--selection-bg);
  color: var(--selection-text);
}

/* 背景と全体 */
body {
  background: #0a1a2b;
  font-family: 'Roboto', sans-serif;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  background-image: radial-gradient(circle at 50% 0%, #1e3a5f 0%, #0a1a2b 70%);
}

/* コンテナ */
.container {
  background: rgba(255, 255, 255, 0.07);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 24px;
  padding: 3rem 2rem;
  max-width: 480px;
  width: 100%;
  box-shadow: 0 0 40px rgba(0, 229, 255, 0.3);
  text-align: center;
  position: relative;
}

/* タイトル */
h1 {
  font-family: Arial, sans-serif;
  font-size: 2.5rem;
  font-weight: 700;
  /* Olympic colors gradient approximation */
  background: linear-gradient(90deg, #33b5e5, #ffbb33, #ffffff, #99cc00, #ff4444);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 8px rgba(255, 255, 255, 0.3), 0 0 20px rgba(255, 255, 255, 0.2);
  margin-bottom: 0.5rem;
  line-height: 1.2;
}

h2 {
  font-family: Arial, sans-serif;
  font-size: 1.1rem;
  background: linear-gradient(90deg, #4fc3f7, #80deea);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: 0.1em;
  margin-bottom: 2rem;
  font-weight: 400;
}

/* カウント表示 */
.countdown-box {
  margin-bottom: 2rem;
}

#statusDisplay {
  font-size: 1.2rem;
  color: #a0e0ff;
  margin-bottom: 0.5rem;
  font-weight: 500;
}

#dayDisplay {
  font-family: Arial, sans-serif;
  font-size: 2.5rem;
  font-weight: 700;
  background: linear-gradient(90deg, #ffd54f, #ffca28, #ffecb3);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
  line-height: 1;
  margin-bottom: 0.5rem;
}

#timeDisplay {
  font-family: Arial, sans-serif;
  font-size: 1.4rem;
  background: linear-gradient(90deg, #80d8ff, #40c4ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: 0.05em;
  margin-top: 0.5rem;
}

/* ボタン */
.controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-bottom: 1rem;
}

button {
  background: rgba(0, 229, 255, 0.15);
  border: none;
  border-radius: 20px;
  color: #00e5ff;
  font-weight: 600;
  padding: 8px 16px;
  cursor: pointer;
  font-family: 'Roboto', sans-serif;
  transition: all 0.3s ease;
  font-size: 0.9rem;
}

button:hover {
  background: rgba(0, 229, 255, 0.3);
  transform: translateY(-1px);
}

button.active {
  background: #00e5ff;
  color: #000;
  box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
}

/* セレクトボックス */
.year-selector {
  margin-bottom: 1.5rem;
}

select {
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(0, 229, 255, 0.3);
  border-radius: 12px;
  color: #fff;
  padding: 6px 12px;
  font-family: 'Roboto', sans-serif;
  font-size: 1rem;
  cursor: pointer;
  outline: none;
}

/* フッター */
.footer {
  font-size: 0.8rem;
  color: #4dd0e1;
  margin-top: 2rem;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  padding-top: 1rem;
  opacity: 0.8;
}

.footer a {
  color: #4ac8e0;
  text-decoration: none;
  transition: color 0.2s;
}

.footer a:hover {
  color: #fff;
  text-decoration: underline;
}

/* スマホ対応 */
@media (max-width: 480px) {
  .container { padding: 2rem 1.5rem; }
  h1 { font-size: 2rem; }
  #dayDisplay { font-size: 1.8rem; }
  #timeDisplay { font-size: 1rem; }
}
</style>
</head>

<body>

<div class="container">
  <h1>Olympic Countdown</h1>
  <h2 id="eventTitle">Loading...</h2>

  <div class="controls">
    <button id="summerBtn" onclick="setMode('summer')">Summer</button>
    <button id="winterBtn" onclick="setMode('winter')">Winter</button>
    <button id="langBtn" onclick="toggleLang()">JP/EN</button>
  </div>

  <div class="year-selector">
    <select id="yearSelect" onchange="changeYear(this.value)" aria-label="Year"></select>
  </div>

  <div class="countdown-box">
    <div id="statusDisplay"></div>
    <div id="dayDisplay"></div>
    <div id="timeDisplay"></div>
  </div>

  <div class="footer" id="footer-copy"></div>
</div>

<script>
// State
let mode = "summer"; 
let lang;
let currentYearKey = null;

// Data
const eventsData = {
  summer: {
    2020: { city: {ja:"東京", en:"Tokyo"}, start: "2021-07-23T20:00:00+09:00", end: "2021-08-08T22:00:00+09:00" },
    2024: { city: {ja:"パリ", en:"Paris"}, start: "2024-07-26T19:30:00+02:00", end: "2024-08-11T23:59:59+02:00" },
    2028: { city: {ja:"ロサンゼルス", en:"Los Angeles"}, start: "2028-07-14T00:00:00-07:00", end: "2028-07-30T23:59:59-07:00" },
    2032: { city: {ja:"ブリスベン", en:"Brisbane"}, start: "2032-07-23T00:00:00+10:00", end: "2032-08-08T23:59:59+10:00" }
  },
  winter: {
    2022: { city: {ja:"北京", en:"Beijing"}, start: "2022-02-04T20:00:00+08:00", end: "2022-02-20T22:00:00+08:00" },
    2026: { city: {ja:"ミラノ・コルティナ", en:"Milan-Cortina"}, start: "2026-02-06T20:00:00+01:00", end: "2026-02-22T23:59:59+01:00" },
    2030: { city: {ja:"フレンチアルプス", en:"French Alps"}, start: "2030-02-08T00:00:00+01:00", end: "2030-02-24T23:59:59+01:00" },
    2034: { city: {ja:"ソルトレイクシティ", en:"Salt Lake City"}, start: "2034-02-10T00:00:00-07:00", end: "2034-02-26T23:59:59-07:00" }
  }
};

function formatDiff(ms) {
  let sec = Math.floor(ms / 1000);
  const y = Math.floor(sec / (365 * 24 * 3600)); sec -= y * 365 * 24 * 3600;
  const mo = Math.floor(sec / (30 * 24 * 3600)); sec -= mo * 30 * 24 * 3600;
  const d = Math.floor(sec / (24 * 3600)); sec -= d * 24 * 3600;
  const h = Math.floor(sec / 3600); sec -= h * 3600;
  const m = Math.floor(sec / 60); sec -= m * 60;
  const s = sec;

  let ymd_str = "";
  if (y > 0) ymd_str += `${y}${lang === 'ja' ? '年 ' : 'y '}`;
  if (mo > 0) ymd_str += `${mo}${lang === 'ja' ? 'ヶ月 ' : 'mo '}`;
  ymd_str += `${d}${lang === 'ja' ? '日' : 'd'}`;
  
  let hms_str;
  if (lang === 'ja') {
    hms_str = `${String(h).padStart(2, '0')}時間 ${String(m).padStart(2, '0')}分 ${String(s).padStart(2, '0')}秒`;
  } else {
    hms_str = `${String(h).padStart(2, '0')}h ${String(m).padStart(2, '0')}m ${String(s).padStart(2, '0')}s`;
  }

  return {
      ymd: ymd_str.trim(),
      hms: hms_str
  };
}

// UI Functions
function setMode(m) {
  mode = m;
  // モード切替時は、そのモードの直近の未来（または最新）の大会を選択する
  autoSelectNearestInMode(m);
  localStorage.setItem('olympicCountdownMode', mode);
  localStorage.setItem('olympicCountdownYear', currentYearKey);
  updateUI();
}

function toggleLang() {
  lang = (lang === "ja") ? "en" : "ja";
  localStorage.setItem('olympicCountdownLang', lang);
  updateUI();
}

function changeYear(y) {
  currentYearKey = y;
  localStorage.setItem('olympicCountdownMode', mode);
  localStorage.setItem('olympicCountdownYear', currentYearKey);
  updateUI();
}

function autoSelectNearestInMode(m) {
  const now = new Date();
  const years = Object.keys(eventsData[m]).sort();
  
  // 未来の大会を探す
  let selected = null;
  for (let y of years) {
    const end = new Date(eventsData[m][y].end);
    if (end > now) {
      selected = y;
      break;
    }
  }
  // 未来がなければ最後の大会
  if (!selected) {
    selected = years[years.length - 1];
  }
  currentYearKey = selected;
}

function initAutoSelect() {
  // クエリパラメータの確認 (?year=2028&lang=en)
  const params = new URLSearchParams(location.search);
  const qYear = params.get("year");
  const qLang = params.get("lang");
  
  // Determine language: query param > localStorage > browser default
  if (qLang === "ja" || qLang === "en") {
    lang = qLang;
  } else {
    const storedLang = localStorage.getItem('olympicCountdownLang');
    if (storedLang === "ja" || storedLang === "en") {
      lang = storedLang;
    } else {
      lang = navigator.language.startsWith('ja') ? "ja" : "en";
    }
  }
  
  if (qYear) {
    if (eventsData.summer[qYear]) { mode = "summer"; currentYearKey = qYear; return; }
    if (eventsData.winter[qYear]) { mode = "winter"; currentYearKey = qYear; return; }
  }

  // ローカルストレージから前回の選択を読み込む
  const storedMode = localStorage.getItem('olympicCountdownMode');
  const storedYear = localStorage.getItem('olympicCountdownYear');
  if (storedMode && storedYear && eventsData[storedMode] && eventsData[storedMode][storedYear]) {
    mode = storedMode;
    currentYearKey = storedYear;
    return;
  }

  const now = new Date();
  let nearestDiff = Infinity;
  let bestMode = "summer";
  let bestYear = null;

  // 全データから現在時刻以降で最も近い開始日の大会を探す
  // もし全て終了していれば、最も終了日が近い（直近の）大会を探す
  
  // まずは未来の大会を優先検索
  ["summer", "winter"].forEach(m => {
    Object.keys(eventsData[m]).forEach(y => {
      const start = new Date(eventsData[m][y].start);
      const end = new Date(eventsData[m][y].end);
      
      if (end > now) {
        // まだ終わっていない大会
        let diff = start - now;
        // 開催中なら優先度最高（diffをマイナスにして扱うなど）
        if (start <= now && now <= end) {
          diff = -1; 
        }
        
        if (diff < nearestDiff) {
          nearestDiff = diff;
          bestMode = m;
          bestYear = y;
        }
      }
    });
  });

  // 未来の大会が見つからなかった場合（全て過去）、直近の過去大会を探す
  if (!bestYear) {
    let minPastDiff = Infinity;
    ["summer", "winter"].forEach(m => {
      Object.keys(eventsData[m]).forEach(y => {
        const end = new Date(eventsData[m][y].end);
        const diff = now - end;
        if (diff < minPastDiff) {
          minPastDiff = diff;
          bestMode = m;
          bestYear = y;
        }
      });
    });
  }

  if (bestYear) {
    mode = bestMode;
    currentYearKey = bestYear;
  } else {
    // フォールバック
    mode = "summer";
    currentYearKey = "2028";
  }
}

function updateUI() {
  // Update Buttons
  document.getElementById("summerBtn").className = mode === "summer" ? "active" : "";
  document.getElementById("winterBtn").className = mode === "winter" ? "active" : "";
  document.getElementById("summerBtn").textContent = lang === "ja" ? "夏季" : "Summer";
  document.getElementById("winterBtn").textContent = lang === "ja" ? "冬季" : "Winter";
  document.getElementById("langBtn").textContent = lang === "ja" ? "EN" : "日本語";
  
  // Update Title
  const mainTitle = document.querySelector("h1");
  mainTitle.textContent = lang === "ja" ? "オリンピック カウントダウン" : "Olympic Countdown";

  // Update Select Box
  const select = document.getElementById("yearSelect");
  select.innerHTML = "";
  const years = Object.keys(eventsData[mode]);
  years.forEach(y => {
    const opt = document.createElement("option");
    opt.value = y;
    const city = eventsData[mode][y].city[lang];
    opt.textContent = `${y} ${city}`;
    if (y == currentYearKey) opt.selected = true;
    select.appendChild(opt);
  });
  
  // Update Logic
  updateCountdown();
}

function updateCountdown() {
  if (!currentYearKey) return;

  const now = new Date();
  const data = eventsData[mode][currentYearKey];
  const start = new Date(data.start);
  const end = new Date(data.end);

  const statusDisplay = document.getElementById("statusDisplay");
  const dayDisplay = document.getElementById("dayDisplay");
  const timeDisplay = document.getElementById("timeDisplay");
  const eventTitle = document.getElementById("eventTitle");
  
  // Event Title
  const cityName = data.city[lang];
  const season = (mode === "summer") ? (lang === "ja" ? "夏季" : "Summer") : (lang === "ja" ? "冬季" : "Winter");
  eventTitle.textContent = `${currentYearKey} ${cityName} ${season}`;

  if (now >= start && now <= end) {
    // 開催中
    const diffStart = now - start;
    const diffEnd = end - now;
    const dayNum = Math.floor(diffStart / (1000 * 60 * 60 * 24)) + 1;
    const remaining = formatDiff(diffEnd);
    
    statusDisplay.textContent = (lang === "ja" ? `大会 ${dayNum} 日目 / 残り` : `Day ${dayNum} / Remaining`);
    dayDisplay.textContent = remaining.ymd;
    timeDisplay.textContent = remaining.hms;

  } else {
    let diff, prefix;
    if (now < start) {
      // 開催前
      diff = start - now;
      prefix = lang === "ja" ? "開催まで" : "Starts in";
    } else {
      // 終了後
      diff = now - end;
      prefix = lang === "ja" ? "終了から" : "Since closing";
    }
    statusDisplay.textContent = prefix;
    const formatted = formatDiff(diff);
    dayDisplay.textContent = formatted.ymd;
    timeDisplay.textContent = formatted.hms;
  }
}

// Footer Logic
(function(){
  const baseYear = 2025;
  const currentYear = new Date().getFullYear();
  const hostname = location.hostname;
  const footer = document.getElementById("footer-copy");
  let footerHTML = "";
  
  let yearStr = baseYear.toString();
  if (currentYear > baseYear) {
    yearStr = `${baseYear}–${currentYear}`;
  } else if (currentYear < baseYear) {
    yearStr = `${currentYear}–${baseYear}`;
  }
  
  if(hostname === "hamuzon.github.io"){
    footerHTML = `&copy; ${yearStr} <a href="https://hamuzon.github.io" target="_blank">@hamuzon</a>`;
  } else if (hostname.includes("hamuzon-jp.f5.si")) {
    footerHTML = `&copy; ${yearStr} <a href="https://hamuzon-jp.f5.si" target="_blank">@hamuzon</a>`;
  } else if(hostname.includes("hamusata.f5.si")){
    footerHTML = `&copy; ${yearStr} <a href="https://home.hamusata.f5.si" target="_blank">@hamusata</a>`;
  } else {
    footerHTML = `&copy; ${yearStr} Olympic Countdown (${currentYearKey || currentYear})`;
  }
  
  if(footer) footer.innerHTML = footerHTML;
})();

// Init
initAutoSelect();
updateUI();
setInterval(updateCountdown, 1000);

</script>

</body>
</html>
