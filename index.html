<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympic Countdown / オリンピック関連カウントダウン</title>
<meta name="description" content="夏季・冬季オリンピックの開催まで、開催期間中、終了後の経過時間をリアルタイムで表示するカウントダウンタイマーです。">
<meta name="keywords" content="オリンピック, カウントダウン, 五輪, Olympic, Countdown, 2026, 2028, 夏季, 冬季">
<meta name="author" content="hamuzon">
<meta property="og:title" content="Olympic Countdown / オリンピック関連カウントダウン">
<meta property="og:description" content="オリンピック開催まで・開催中・終了後の時間を、年・月・日・時分秒でリアルタイム表示するカウントダウンです。">
<meta property="og:type" content="website">
<meta property="og:url" content="">
<meta property="og:locale" content="ja_JP">
<meta name="twitter:card" content="summary">

<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

/* カスタムプロパティ */
:root {
  --selection-bg: rgba(0, 229, 255, 0.4);
  --selection-text: #ffffff;
}

/* リセット */
* { margin:0; padding:0; box-sizing:border-box; }

::selection {
  background: var(--selection-bg);
  color: var(--selection-text);
}

/* 背景と全体 */
body {
  background: #0a1a2b;
  font-family: 'Roboto', sans-serif;
  color: #fff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 1rem;
  background-image: radial-gradient(circle at 50% 0%, #1e3a5f 0%, #0a1a2b 70%);
}

/* コンテナ */
.container {
  background: rgba(255, 255, 255, 0.08);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 24px;
  padding: 2.5rem 2rem;
  max-width: 480px;
  width: 100%;
  box-shadow: 0 0 40px rgba(0, 229, 255, 0.3);
  text-align: center;
  position: relative;
}

/* タイトル */
h1 {
  font-family: Arial, sans-serif;
  font-size: 2.5rem;
  font-weight: 700;
  /* Olympic colors gradient approximation */
  background: linear-gradient(90deg, #33b5e5, #ffbb33, #ffffff, #99cc00, #ff4444);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 8px rgba(255, 255, 255, 0.3), 0 0 20px rgba(255, 255, 255, 0.2);
  margin-bottom: 0.5rem;
  line-height: 1.2;
}

h2 {
  font-family: Arial, sans-serif;
  font-size: 1.1rem;
  background: linear-gradient(90deg, #4fc3f7, #80deea);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: 0.1em;
  margin-bottom: 2rem;
  font-weight: 400;
}

/* カウント表示 */
.countdown-box {
  margin-bottom: 2rem;
}

#statusDisplay {
  font-size: 1.2rem;
  color: #a0e0ff;
  margin-bottom: 0.5rem;
  font-weight: 500;
}

#dayDisplay {
  font-size: 3rem;
  font-weight: 700;
  background: linear-gradient(90deg, #ffd54f, #ffca28, #ffecb3);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
  line-height: 1.1;
  margin: 0.5rem 0;
}

#timeDisplay {
  font-family: Arial, sans-serif;
  font-size: 1.4rem;
  background: linear-gradient(90deg, #80d8ff, #40c4ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: 0.05em;
  margin-top: 0.5rem;
}

/* ボタン */
.controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-bottom: 1rem;
}

button {
  background: rgba(0, 229, 255, 0.15);
  border: none;
  border-radius: 20px;
  color: #00e5ff;
  font-weight: 600;
  padding: 8px 16px;
  cursor: pointer;
  font-family: 'Roboto', sans-serif;
  transition: all 0.3s ease;
  font-size: 0.9rem;
}

button:hover {
  background: rgba(0, 229, 255, 0.3);
  transform: translateY(-1px);
}

button.active {
  background: #00e5ff;
  color: #000;
  box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
}

/* セレクトボックス */
.year-selector {
  margin-bottom: 1.5rem;
}

select {
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(0, 229, 255, 0.3);
  border-radius: 12px;
  color: #fff;
  padding: 6px 12px;
  font-family: 'Roboto', sans-serif;
  font-size: 1rem;
  cursor: pointer;
  outline: none;
}

/* フッター */
.footer {
  font-size: 0.8rem;
  color: #4dd0e1;
  margin-top: 2rem;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  padding-top: 1rem;
  opacity: 0.8;
}

.footer a {
  color: #4ac8e0;
  text-decoration: none;
  transition: color 0.2s;
}

.footer a:hover {
  color: #fff;
  text-decoration: underline;
}

.notice {
  margin-top: 1rem;
  font-size: 0.85rem;
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.78);
  text-align: left;
}

.notice p {
  margin: 0.2rem 0;
}

/* スマホ対応 */
@media (max-width: 480px) {
  .container { padding: 2rem 1.5rem; }
  h1 { font-size: 2rem; }
  #dayDisplay { font-size: 1.8rem; }
  #timeDisplay { font-size: 1rem; }
}
</style>
</head>

<body>

<div class="container">
  <h1>Olympic Countdown</h1>
  <h2 id="eventTitle">Loading...</h2>

  <div class="controls">
    <button id="summerBtn" onclick="setMode('summer')">Summer</button>
    <button id="winterBtn" onclick="setMode('winter')">Winter</button>
    <button id="langBtn" onclick="toggleLang()">JP/EN</button>
  </div>

  <div class="year-selector">
    <select id="yearSelect" onchange="changeYear(this.value)" aria-label="Year"></select>
  </div>

  <div class="countdown-box">
    <div id="statusDisplay"></div>
    <div id="dayDisplay"></div>
    <div id="timeDisplay"></div>
  </div>

  <div class="notice" id="countdownNotice" aria-live="polite"></div>

  <div class="footer" id="footer-copy"></div>
</div>

<script>
// --- CONFIGURATION (1: ON, 0: OFF) ---
const CONFIG = {
  SUMMER_ENABLED: 1,
  WINTER_ENABLED: 1
};

// State
let mode = "summer"; 
let lang;
let currentYearKey = null;

// Data
const eventsData = {
  summer: {
    2020: { city: {ja:"東京", en:"Tokyo"}, start: "2021-07-23T20:00:00+09:00", end: "2021-08-08T22:00:00+09:00" },
    2024: { city: {ja:"パリ", en:"Paris"}, start: "2024-07-26T19:30:00+02:00", end: "2024-08-11T23:59:59+02:00" },
    2028: { city: {ja:"ロサンゼルス", en:"Los Angeles"}, start: "2028-07-14T00:00:00-07:00", end: "2028-07-30T23:59:59-07:00" },
    2032: { city: {ja:"ブリスベン", en:"Brisbane"}, start: "2032-07-23T00:00:00+10:00", end: "2032-08-08T23:59:59+10:00" }
  },
  winter: {
    2022: { city: {ja:"北京", en:"Beijing"}, start: "2022-02-04T20:00:00+08:00", end: "2022-02-20T22:00:00+08:00" },
    2026: { city: {ja:"ミラノ・コルティナ", en:"Milan-Cortina"}, start: "2026-02-06T20:00:00+01:00", end: "2026-02-22T23:59:59+01:00" },
    2030: { city: {ja:"フレンチアルプス", en:"French Alps"}, start: "2030-02-08T00:00:00+01:00", end: "2030-02-24T23:59:59+01:00" },
    2034: { city: {ja:"ソルトレイクシティ", en:"Salt Lake City"}, start: "2034-02-10T00:00:00-07:00", end: "2034-02-26T23:59:59-07:00" }
  }
};

function getCalendarDiff(fromDate, toDate) {
  const from = new Date(fromDate);
  const to = new Date(toDate);
  if (to <= from) {
    return { years: 0, months: 0, days: 0, hours: 0, minutes: 0, seconds: 0 };
  }

  const cursor = new Date(from);
  let years = to.getFullYear() - cursor.getFullYear();
  const anniversary = new Date(cursor);
  anniversary.setFullYear(cursor.getFullYear() + years);
  if (anniversary > to) years -= 1;
  cursor.setFullYear(cursor.getFullYear() + years);

  let months = (to.getFullYear() - cursor.getFullYear()) * 12 + (to.getMonth() - cursor.getMonth());
  const monthMark = new Date(cursor);
  monthMark.setMonth(cursor.getMonth() + months);
  if (monthMark > to) months -= 1;
  cursor.setMonth(cursor.getMonth() + months);

  let remainMs = to - cursor;
  const days = Math.floor(remainMs / 86400000);
  remainMs -= days * 86400000;
  const hours = Math.floor(remainMs / 3600000);
  remainMs -= hours * 3600000;
  const minutes = Math.floor(remainMs / 60000);
  remainMs -= minutes * 60000;
  const seconds = Math.floor(remainMs / 1000);

  return { years, months, days, hours, minutes, seconds };
}

/**
 * 残り時間のフォーマット計算
 */
function formatDiff(fromDate, toDate) {
  const diff = getCalendarDiff(fromDate, toDate);
  const pad = (n) => String(n).padStart(2, '0');

  // 表示用文字列の組み立て
  let ymdStr = "";
  if (diff.years > 0) {
    ymdStr += `${diff.years}${lang === 'ja' ? '年' : 'y'} `;
  }
  if (diff.months > 0) {
    ymdStr += `${diff.months}${lang === 'ja' ? 'ヶ月' : 'mo'} `;
  }
  ymdStr += `${diff.days}${lang === 'ja' ? '日' : 'd'}`;

  const hmsStr = lang === 'ja'
    ? `${diff.hours}時間 ${diff.minutes}分 ${diff.seconds}秒`
    : `${pad(diff.hours)}h ${pad(diff.minutes)}m ${pad(diff.seconds)}s`;

  return { ymd: ymdStr, hms: hmsStr };
}

// UI Functions
function setMode(m) {
  if (m === 'summer' && !CONFIG.SUMMER_ENABLED) return;
  if (m === 'winter' && !CONFIG.WINTER_ENABLED) return;

  mode = m;
  autoSelectNearestInMode(m);
  localStorage.setItem('olympicCountdownMode', mode);
  localStorage.setItem('olympicCountdownYear', currentYearKey);
  updateUI();
}

function toggleLang() {
  lang = lang === "ja" ? "en" : "ja";
  localStorage.setItem('olympicCountdownLang', lang);
  updateUI();
}

function changeYear(y) {
  currentYearKey = y;
  localStorage.setItem('olympicCountdownYear', currentYearKey);
  updateUI();
}

function autoSelectNearestInMode(m) {
  const now = Date.now();
  const years = Object.keys(eventsData[m]).sort();
  
  // 未来の大会、または一番新しい大会を選択
  const futureYear = years.find(y => new Date(eventsData[m][y].end).getTime() > now);
  currentYearKey = futureYear || years[years.length - 1];
}

function initAutoSelect() {
  const params = new URLSearchParams(location.search);

  // リセット判定: reset, reboot, restart のいずれかが 1 または ON の場合
  const isReset = ["reset", "reboot", "restart"].some(k => 
    ["1", "on"].includes(params.get(k)?.toLowerCase())
  );

  const qYear = params.get("year");
  const qLang = params.get("lang");

  // 言語の初期化（URL優先）
  if (qLang === "ja" || qLang === "en") {
    lang = qLang;
  } else {
    lang = (!isReset && localStorage.getItem('olympicCountdownLang')) || 
           (navigator.language.startsWith('ja') ? "ja" : "en");
  }

  // 年・モードの初期化（URL優先）
  if (qYear) {
    if (eventsData.summer[qYear]) {
      mode = "summer";
      currentYearKey = qYear;
    } else if (eventsData.winter[qYear]) {
      mode = "winter";
      currentYearKey = qYear;
    }
  }

  // URLで指定がない、またはリセット指定がある場合はストレージを無視して自動選択
  if (!currentYearKey) {
    mode = (!isReset && localStorage.getItem('olympicCountdownMode')) || "summer";
    const storedYear = !isReset && localStorage.getItem('olympicCountdownYear');

    if (storedYear && eventsData[mode][storedYear]) {
      currentYearKey = storedYear;
    } else {
      autoSelectNearestInMode(mode);
    }
  }
}

// UIの更新 / Update UI elements
function updateUI() {
  const sBtn = document.getElementById("summerBtn");
  const wBtn = document.getElementById("winterBtn");
  const lBtn = document.getElementById("langBtn");

  sBtn.className = mode === "summer" ? "active" : "";
  wBtn.className = mode === "winter" ? "active" : "";
  sBtn.style.display = CONFIG.SUMMER_ENABLED ? "inline-block" : "none";
  wBtn.style.display = CONFIG.WINTER_ENABLED ? "inline-block" : "none";
  
  sBtn.textContent = lang === "ja" ? "夏季" : "Summer";
  wBtn.textContent = lang === "ja" ? "冬季" : "Winter";
  lBtn.textContent = lang === "ja" ? "EN" : "日本語";
  
  const mainTitle = document.querySelector("h1");
  mainTitle.textContent = lang === "ja" ? "オリンピック カウントダウン" : "Olympic Countdown";

  const notice = document.getElementById("countdownNotice");
  if (notice) {
    notice.textContent = lang === "ja"
      ? "※カウントダウンは目安であり、実際の開催時刻と異なる場合があります。"
      : "Note: Countdown is for reference only and may differ from actual start times.";
  }

  const select = document.getElementById("yearSelect");
  select.innerHTML = "";

  const years = Object.keys(eventsData[mode]);

  years.forEach(y => {
    const opt = document.createElement("option");
    opt.value = y;
    opt.textContent = `${y} ${eventsData[mode][y].city[lang]}`;
    opt.selected = (y === currentYearKey);
    select.appendChild(opt);
  });
  
  updateCountdown();
  updateQueryParams();
  updateSocialMeta();
}

// カウントダウンのメインロジック / Main Countdown Logic
function updateCountdown() {
  if (!currentYearKey) return;

  const now = new Date();
  const data = eventsData[mode][currentYearKey];
  const start = new Date(data.start);
  const end = new Date(data.end);

  const statusDisplay = document.getElementById("statusDisplay");
  const dayDisplay = document.getElementById("dayDisplay");
  const timeDisplay = document.getElementById("timeDisplay");
  const eventTitle = document.getElementById("eventTitle");
  
  const cityName = data.city[lang];

  eventTitle.textContent = `${currentYearKey} ${cityName}`;

  // 開催期間中・前後による分岐 / Branch by event status
  if (now >= start && now <= end) {
    const diffStart = now - start;
    const diffEnd = end - now;

    const dayNum = Math.floor(diffStart / (1000 * 60 * 60 * 24)) + 1;
    const remaining = formatDiff(now, end);
    
    statusDisplay.textContent = (lang === "ja" ? `大会 ${dayNum} 日目 / 残り` : `Day ${dayNum} / Remaining`);
    dayDisplay.textContent = remaining.ymd;
    timeDisplay.textContent = remaining.hms;
  } 
  else {
    let prefix;

    if (now < start) {
      prefix = lang === "ja" ? "開催まで" : "Starts in";
    } else {
      prefix = lang === "ja" ? "終了から" : "Since closing";
    }

    statusDisplay.textContent = prefix;

    const formatted = now < start ? formatDiff(now, start) : formatDiff(end, now);

    dayDisplay.textContent = formatted.ymd;
    timeDisplay.textContent = formatted.hms;
  }
}

function updateSocialMeta() {
  if (!currentYearKey || !eventsData[mode][currentYearKey]) return;
  const data = eventsData[mode][currentYearKey];
  const cityName = data.city[lang];
  const season = lang === "ja" ? (mode === "summer" ? "夏季" : "冬季") : (mode === "summer" ? "Summer" : "Winter");
  const title = lang === "ja"
    ? `${currentYearKey} ${cityName} ${season}オリンピック カウントダウン`
    : `${currentYearKey} ${cityName} ${season} Olympics Countdown`;
  const description = lang === "ja"
    ? `${currentYearKey}年${cityName}オリンピックまで・開催中・終了後の経過時間をリアルタイム表示。`
    : `Real-time timer for ${currentYearKey} ${cityName} Olympics: before, during, and after the Games.`;
  const canonicalUrl = window.location.origin + window.location.pathname + `?year=${encodeURIComponent(currentYearKey)}&lang=${encodeURIComponent(lang)}`;
  const locale = lang === "ja" ? "ja_JP" : "en_US";

  document.title = title;
  document.querySelector('meta[name="description"]')?.setAttribute("content", description);
  document.querySelector('meta[property="og:title"]')?.setAttribute("content", title);
  document.querySelector('meta[property="og:description"]')?.setAttribute("content", description);
  document.querySelector('meta[property="og:url"]')?.setAttribute("content", canonicalUrl);
  document.querySelector('meta[property="og:locale"]')?.setAttribute("content", locale);
}

// URLクエリパラメータの同期 / Sync URL Query Parameters
function updateQueryParams() {
  // 新しい URLSearchParams オブジェクトを作成することで、既存の全パラメータをクリア
  const newParams = new URLSearchParams();

  // 指定された順序（1. 年, 2. 言語）でパラメータをセット
  if (currentYearKey) newParams.set('year', currentYearKey);
  newParams.set('lang', lang);

  // 現在のパスを維持しつつ、整理されたクエリ文字列でURLを更新
  const newUrl = window.location.pathname + '?' + newParams.toString();
  window.history.replaceState({}, '', newUrl);
}

// フッターの著作権表示ロジック / Footer Copyright Logic
(function(){
  const baseYear = 2025;
  const currentYear = new Date().getFullYear();
  const hostname = location.hostname;
  const footer = document.getElementById("footer-copy");

  let footerHTML = "";
  let yearStr = baseYear.toString();

  // 年度範囲の決定 / Determine year range
  if (currentYear > baseYear) {
    yearStr = `${baseYear}–${currentYear}`;
  } else if (currentYear < baseYear) {
    yearStr = `${currentYear}–${baseYear}`;
  }
  
  if(hostname === "hamuzon.github.io"){
    footerHTML = `&copy; ${yearStr} <a href="https://hamuzon.github.io" target="_blank">@hamuzon</a>`;
  } else if (hostname.includes("hamuzon-jp.f5.si")) {
    footerHTML = `&copy; ${yearStr} <a href="https://hamuzon-jp.f5.si" target="_blank">@hamuzon</a>`;
  } else if(hostname.includes("hamusata.f5.si")){
    footerHTML = `&copy; ${yearStr} <a href="https://hamusata.f5.si" target="_blank">@hamusata</a>`;
  } else {
    footerHTML = `&copy; ${yearStr} Olympic Countdown (${currentYearKey || currentYear})`;
  }
  
  if(footer) footer.innerHTML = footerHTML;
})();

// 初期実行 / Initial execution
initAutoSelect();
updateUI();
setInterval(updateCountdown, 1000);

</script>

</body>
</html>
